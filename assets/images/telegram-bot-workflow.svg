<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 740" role="img" aria-labelledby="title desc">
  <title id="title">Telegram Bot for Game Utility workflow overview</title>
  <desc id="desc">High-level workflow showing Telegram input, n8n workflow handling, Playwright browser automation, Telegram response, and Docker as the surrounding runtime layer.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#56b5c5"/>
    </marker>
    <style>
      text {
        font-family: Inter, "Segoe UI", sans-serif;
      }
      .runtime-box {
        fill: rgba(27, 35, 43, 0.62);
        stroke: rgba(132, 173, 195, 0.3);
        stroke-width: 1.5;
      }
      .runtime-label {
        fill: #edf2f4;
        font-size: 24px;
        font-weight: 700;
      }
      .runtime-copy {
        fill: #9eacb8;
        font-size: 16px;
        font-weight: 500;
      }
      .flow-box {
        fill: #1b232b;
        stroke: rgba(132, 173, 195, 0.3);
        stroke-width: 1.5;
      }
      .flow-line {
        fill: none;
        stroke: #56b5c5;
        stroke-width: 2.4;
        stroke-linecap: round;
        opacity: 0.9;
      }
      .box-label {
        fill: #edf2f4;
        font-size: 28px;
        font-weight: 700;
        text-anchor: middle;
      }
      .box-copy {
        fill: #9eacb8;
        font-size: 18px;
        font-weight: 500;
        text-anchor: middle;
      }
    </style>
  </defs>

  <rect class="runtime-box" x="80" y="52" width="700" height="636" rx="24"/>
  <text class="runtime-label" x="116" y="102">Docker runtime</text>
  <text class="runtime-copy" x="116" y="130">Packaging layer around the bot workflow</text>

  <path class="flow-line" d="M430 238V266" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M430 368V396" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M430 498V526" marker-end="url(#arrow)"/>

  <rect class="flow-box" x="290" y="150" width="280" height="88" rx="18"/>
  <text class="box-label" x="430" y="188">Telegram</text>
  <text class="box-copy" x="430" y="216">user request</text>

  <rect class="flow-box" x="290" y="280" width="280" height="88" rx="18"/>
  <text class="box-label" x="430" y="318">n8n Workflow</text>
  <text class="box-copy" x="430" y="346">logic and routing</text>

  <rect class="flow-box" x="290" y="410" width="280" height="88" rx="18"/>
  <text class="box-label" x="430" y="448">Playwright</text>
  <text class="box-copy" x="430" y="476">browser-driven steps</text>

  <rect class="flow-box" x="290" y="540" width="280" height="88" rx="18"/>
  <text class="box-label" x="430" y="578">Telegram Response</text>
  <text class="box-copy" x="430" y="606">result returned</text>
</svg>
